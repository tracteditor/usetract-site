  <line x1="9" y1="42" x2="45" y2="42" stroke="#D4320A" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="14" y1="29" x2="36" y2="57" stroke="#D4320A" stroke-width="2.4" stroke-linecap="round"/>
