  <line x1="31" y1="26" x2="31" y2="60" stroke="#F5F3EE" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="39" y1="26" x2="39" y2="60" stroke="#F5F3EE" stroke-width="2.2" stroke-linecap="round"/>

